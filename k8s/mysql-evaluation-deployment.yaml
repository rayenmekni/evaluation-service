apiVersion: v1
kind: Secret
metadata:
  name: mysql-evaluation-secret
type: Opaque
data:
  root-password: cm9vdA==
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-evaluation-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-evaluation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-evaluation
  template:
    metadata:
      labels:
        app: mysql-evaluation
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-evaluation-secret
              key: root-password
        - name: MYSQL_DATABASE
          value: evaluation
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-evaluation-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-evaluation-service
spec:
  selector:
    app: mysql-evaluation
  ports:
  - port: 3306
    targetPort: 3306
